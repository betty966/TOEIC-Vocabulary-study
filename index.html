<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多益學習 - 簡易版</title>
    <style>
        :root {
            --bg-color: #FDFBF7; --text-color: #4A3B32; --card-bg: #FFFFFF;
            --btn-color: #C1A68D; --btn-hover: #A68A6D; --level-light: #E8D8C8;
            --level-dark: #8C6D53; --dark-text: #FFFFFF;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); max-width: 800px; margin: 0 auto; padding: 20px; }
        h1, h2 { text-align: center; color: var(--text-color); }
        .mode-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .mode-btn { background-color: transparent; color: var(--text-color); border: 2px solid var(--btn-color); padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .mode-btn.active { background-color: var(--btn-color); color: white; }
        #list-view, #flashcard-view { display: none; }
        #list-view.active, #flashcard-view.active { display: block; }
        .form-container { background-color: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; border: 2px solid var(--btn-color); }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; margin-bottom: 15px; }
        .form-row .form-group { margin-bottom: 0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid #CCC; border-radius: 6px; box-sizing: border-box; }
        button { background-color: var(--btn-color); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button:hover { background-color: var(--btn-hover); }
        #word-list { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .word-card { padding: 20px; border-radius: 12px; position: relative; }
        .status-light { background-color: var(--level-light); color: var(--text-color); }
        .status-dark { background-color: var(--level-dark); color: var(--dark-text); }
        .card-header { display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 15px; }
        .status-dark .card-header { border-bottom: 1px solid rgba(255,255,255,0.3); }
        .word-title { font-size: 26px; font-weight: bold; margin: 0; margin-right: 10px; }
        .word-translation { font-size: 18px; margin-right: 15px; font-weight: normal; }
        .pos-badge { background-color: rgba(0,0,0,0.1); padding: 3px 8px; border-radius: 4px; font-size: 14px; margin-right: 15px; }
        .speaker-btn { background: none; border: none; font-size: 24px; cursor: pointer; width: auto; padding: 0; margin-right: auto; }
        .edit-btn { background-color: rgba(255,255,255,0.3); width: auto; padding: 5px 15px; font-size: 14px; color: inherit; }
        .status-dark .edit-btn { background-color: rgba(255,255,255,0.2); color: white; }
        .word-content { margin-bottom: 10px; line-height: 1.6; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background-color: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .status-dark .grid-info { background-color: rgba(0,0,0,0.1); }
        
        /* 翻轉字卡 */
        .flashcard-container { perspective: 1000px; max-width: 500px; margin: 0 auto 30px auto; height: 350px; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; text-align: center; }
        .card-front { background-color: var(--card-bg); border: 4px solid var(--btn-color); color: var(--text-color); }
        .card-front h2 { font-size: 42px; margin: 0 0 15px 0; }
        .card-front .hint { font-size: 14px; color: #888; position: absolute; bottom: 20px; }
        .card-back { background-color: var(--btn-color); color: white; transform: rotateY(180deg); border: 4px solid var(--btn-hover); }
        .card-back h2 { font-size: 32px; margin: 0 0 10px 0; color: white; }
        .card-back p { font-size: 16px; margin: 5px 0; }
        .card-back .example { background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 15px; text-align: left; width: 100%; }
        .fc-controls { display: flex; justify-content: center; gap: 15px; max-width: 500px; margin: 0 auto; }
        .fc-btn { background-color: white; color: var(--text-color); border: 2px solid var(--btn-color); }
        .fc-progress { text-align: center; margin-bottom: 10px; font-weight: bold; color: #888;}
        
        /* 同步專用樣式 */
        .sync-section { background: #EEE5DB; padding: 15px; border-radius: 12px; margin-top: 40px; text-align: center; border: 1px dashed var(--text-color); }
        .sync-btns { display: flex; gap: 10px; margin-top: 10px; }
        .sync-btns button { background-color: #A68A6D; font-size: 14px; padding: 8px; }
    </style>
</head>
<body>

    <h1>☕ 多益第三階段特訓</h1>

    <div class="mode-switch">
        <button class="mode-btn active" id="btn-list" onclick="switchMode('list')">📝 列表管理</button>
        <button class="mode-btn" id="btn-fc" onclick="switchMode('flashcard')">🃏 翻翻樂小考</button>
    </div>

    <div id="list-view" class="active">
        <div class="form-container">
            <h2 id="form-title">新增單字</h2>
            <input type="hidden" id="edit-id" value="">
            <div class="form-row">
                <div class="form-group" style="flex: 2;"><label>單字 *</label><input type="text" id="word" required></div>
                <div class="form-group" style="flex: 2;"><label>中文意思 *</label><input type="text" id="translation" required></div>
                <div class="form-group" style="flex: 1;"><label>詞性</label><input type="text" id="pos"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>常見搭配詞</label><input type="text" id="collocation"></div>
                <div class="form-group"><label>同義/反義</label><input type="text" id="synAnt"></div>
            </div>
            <div class="form-group"><label>例句 *</label><textarea id="example" rows="2" required></textarea></div>
            <div class="form-group"><label>出題重點 *</label><textarea id="focus" rows="2" required></textarea></div>
            <div class="form-group">
                <label>熟悉度</label>
                <select id="status">
                    <option value="light">有一點點知道 (淺奶茶色)</option>
                    <option value="dark">完全不知道 (深咖啡色)</option>
                </select>
            </div>
            <button onclick="saveWord()" id="save-btn">儲存單字</button>
        </div>
        <div id="word-list"></div>

        <div class="sync-section">
            <strong>📱 平板/手機 跨裝置同步助手</strong>
            <div class="sync-btns">
                <button onclick="exportWords()">📤 點我「匯出」並複製單字</button>
                <button onclick="importWords()">📥 點我「匯入」單字</button>
            </div>
        </div>
    </div>

    <div id="flashcard-view">
        <div class="fc-progress" id="fc-progress">字卡進度: 0 / 0</div>
        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="flashcard-element">
                <div class="card-face card-front">
                    <h2 id="fc-word">Word</h2>
                    <button class="speaker-btn" onclick="speakWordFC(event)">🔊 點擊發音</button>
                    <div class="hint">點擊卡片翻面看中文 ↺</div>
                </div>
                <div class="card-face card-back">
                    <h2 id="fc-trans">中文意思</h2>
                    <p id="fc-pos" style="font-weight: bold; color: #FFEBCD;"></p>
                    <div class="example"><strong>📝 例句：</strong><br><span id="fc-example"></span></div>
                </div>
            </div>
        </div>
        <div class="fc-controls">
            <button class="fc-btn" onclick="prevCard()">⬅ 上一個</button>
            <button class="fc-btn" onclick="shuffleCards()">🔀 隨機打亂</button>
            <button class="fc-btn" onclick="nextCard()">下一個 ➡</button>
        </div>
    </div>

    <script>
        // 本地記憶體讀取
        let words = JSON.parse(localStorage.getItem('toeic_data')) || [];

        function saveToStorage() {
            localStorage.setItem('toeic_data', JSON.stringify(words));
        }

        // 跨裝置手動同步
        function exportWords() {
            if (words.length === 0) { alert("目前沒有單字可以匯出喔！"); return; }
            const dataStr = btoa(encodeURIComponent(JSON.stringify(words)));
            navigator.clipboard.writeText(dataStr).then(() => {
                alert("👍 複製成功！請把進度傳到 LINE 給另一台裝置，然後在另一台裝置點擊「匯入」貼上即可。");
            }).catch(() => {
                alert("請手動複製這段代碼：\n\n" + dataStr);
            });
        }

        function importWords() {
            const dataStr = prompt("請貼上從另一台裝置複製過來的同步代碼：");
            if (!dataStr) return;
            try {
                const parsedData = JSON.parse(decodeURIComponent(atob(dataStr)));
                if (Array.isArray(parsedData)) {
                    words = parsedData;
                    saveToStorage();
                    renderWords();
                    alert("🎉 單字匯入成功！進度已同步。");
                } else { alert("代碼格式不正確！"); }
            } catch(e) { alert("匯入失敗，請確認代碼是否完整複製。"); }
        }

        function switchMode(mode) {
            document.getElementById('btn-list').classList.remove('active');
            document.getElementById('btn-fc').classList.remove('active');
            document.getElementById('list-view').classList.remove('active');
            document.getElementById('flashcard-view').classList.remove('active');
            if (mode === 'list') {
                document.getElementById('btn-list').classList.add('active');
                document.getElementById('list-view').classList.add('active');
                renderWords();
            } else if (mode === 'flashcard') {
                document.getElementById('btn-fc').classList.add('active');
                document.getElementById('flashcard-view').classList.add('active');
                initFlashcards();
            }
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }
        function speakWord(word) { speakText(word); }
        function speakWordFC(event) { event.stopPropagation(); speakText(quizWords[currentCardIndex].word); }

        function renderWords() {
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            words.forEach(item => {
                const cardClass = item.status === 'dark' ? 'status-dark' : 'status-light';
                const card = document.createElement('div');
                card.className = `word-card ${cardClass}`;
                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="word-title">${item.word}</h3>
                        <span class="word-translation">(${item.translation})</span>
                        ${item.pos ? `<span class="pos-badge">${item.pos}</span>` : ''}
                        <button class="speaker-btn" onclick="speakWord('${item.word}')">🔊</button>
                        <button class="edit-btn" onclick="editWord(${item.id})">編輯</button>
                    </div>
                    <div class="grid-info">
                        <div><strong>🔗 搭配詞：</strong><br>${item.collocation || '-'}</div>
                        <div><strong>🔄 同/反義：</strong><br>${item.synAnt || '-'}</div>
                    </div>
                    <div class="word-content"><strong>📝 例句：</strong><br>${item.example}</div>
                    <div class="word-content"><strong>🎯 出題重點：</strong><br>${item.focus}</div>
                `;
                list.appendChild(card);
            });
        }

        function saveWord() {
            const idInput = document.getElementById('edit-id').value;
            const newWord = {
                word: document.getElementById('word').value.trim(),
                translation: document.getElementById('translation').value.trim(),
                pos: document.getElementById('pos').value.trim(),
                collocation: document.getElementById('collocation').value.trim(),
                synAnt: document.getElementById('synAnt').value.trim(),
                example: document.getElementById('example').value.trim(),
                focus: document.getElementById('focus').value.trim(),
                status: document.getElementById('status').value
            };

            if (!newWord.word || !newWord.translation || !newWord.example || !newWord.focus) {
                alert('請填寫必填欄位！'); return;
            }

            if (idInput) {
                const index = words.findIndex(w => w.id === parseInt(idInput));
                newWord.id = parseInt(idInput);
                words[index] = newWord;
                document.getElementById('form-title').innerText = '新增單字';
                document.getElementById('save-btn').innerText = '儲存單字';
            } else {
                newWord.id = new Date().getTime();
                words.unshift(newWord);
            }

            saveToStorage();
            renderWords();

            document.getElementById('edit-id').value = '';
            document.getElementById('word').value = '';
            document.getElementById('translation').value = '';
            document.getElementById('pos').value = '';
            document.getElementById('collocation').value = '';
            document.getElementById('synAnt').value = '';
            document.getElementById('example').value = '';
            document.getElementById('focus').value = '';
            document.getElementById('status').value = 'light';
        }

        function editWord(id) {
            const item = words.find(w => w.id === id);
            if (item) {
                document.getElementById('edit-id').value = item.id;
                document.getElementById('word').value = item.word;
                document.getElementById('translation').value = item.translation || '';
                document.getElementById('pos').value = item.pos || '';
                document.getElementById('collocation').value = item.collocation || '';
                document.getElementById('synAnt').value = item.synAnt || '';
                document.getElementById('example').value = item.example;
                document.getElementById('focus').value = item.focus;
                document.getElementById('status').value = item.status;
                document.getElementById('form-title').innerText = '編輯單字';
                document.getElementById('save-btn').innerText = '更新單字';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        let quizWords = [];
        let currentCardIndex = 0;
        const cardElement = document.getElementById('flashcard-element');

        function initFlashcards() {
            if (words.length === 0) {
                document.getElementById('fc-word').innerText = "尚無單字";
                document.getElementById('fc-trans').innerText = "請先新增單字";
                return;
            }
            quizWords = [...words];
            currentCardIndex = 0;
            cardElement.classList.remove('is-flipped');
            updateFlashcardUI();
        }

        function updateFlashcardUI() {
            const currentWord = quizWords[currentCardIndex];
            document.getElementById('fc-progress').innerText = `字卡進度: ${currentCardIndex + 1} / ${quizWords.length}`;
            document.getElementById('fc-word').innerText = currentWord.word;
            document.getElementById('fc-trans').innerText = currentWord.translation;
            document.getElementById('fc-pos').innerText = currentWord.pos ? `[ ${currentWord.pos} ]` : '';
            document.getElementById('fc-example').innerText = currentWord.example;
        }

        function flipCard() { cardElement.classList.toggle('is-flipped'); }
        function nextCard() {
            if (currentCardIndex < quizWords.length - 1) {
                cardElement.classList.remove('is-flipped');
                setTimeout(() => { currentCardIndex++; updateFlashcardUI(); }, 200);
            }
        }
        function prevCard() {
            if (currentCardIndex > 0) {
                cardElement.classList.remove('is-flipped');
                setTimeout(() => { currentCardIndex--; updateFlashcardUI(); }, 200);
            }
        }
        function shuffleCards() {
            cardElement.classList.remove('is-flipped');
            setTimeout(() => {
                for (let i = quizWords.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [quizWords[i], quizWords[j]] = [quizWords[j], quizWords[i]];
                }
                currentCardIndex = 0;
                updateFlashcardUI();
            }, 200);
        }

        renderWords();
    </script>
</body>
</html>
